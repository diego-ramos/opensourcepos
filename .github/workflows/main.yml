name: Coding Standards

on:
  push:
    paths:
      - '**.php'
      - 'spark'
      - '.github/workflows/test-coding-standards.yml'
  pull_request:
    paths:
      - '**.php'
      - 'spark'
      - '.github/workflows/test-coding-standards.yml'

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Get composer cache directory
        run: echo "COMPOSER_CACHE_FILES_DIR=$(composer config cache-files-dir)" >> $GITHUB_ENV

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ env.COMPOSER_CACHE_FILES_DIR }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}

      - name: Configure Composer auth
        run: composer config --global github-oauth.github.com ${{ secrets.COMPOSER_TOKEN }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run PHP CS Fixer on changed files
        run: |
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref || 'master' }} -- '*.php')
          if [ -n "$CHANGED_FILES" ]; then
            echo "Checking changed PHP files:"
            echo "$CHANGED_FILES"
            vendor/bin/php-cs-fixer fix --dry-run --diff --config=.php-cs-fixer.no-header.php --using-cache=no --sequential $CHANGED_FILES
          else
            echo "No PHP files changed."
          fi